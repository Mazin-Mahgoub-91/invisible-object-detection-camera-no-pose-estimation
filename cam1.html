<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>كاميرا الهالات</title>
<style>
body{background:#000;margin:0;overflow:hidden;color:#0f0;font-family:tahoma}
video,canvas{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover}
#ui{position:absolute;top:10px;right:10px;z-index:10;background:#000a;padding:10px;border:2px solid #0f0;border-radius:8px}
button{background:#0f0;color:#000;border:none;padding:8px 15px;margin:3px;cursor:pointer;border-radius:5px;font-weight:bold}
label{color:#ff0;font-size:13px}
input[type=range]{width:100px}
</style>
</head>
<body>
<video id="cam" autoplay playsinline></video>
<canvas id="out"></canvas>

<div id="ui">
<h3 style="color:#ff0;margin:0 0 10px">كاميرا الطاقة</h3>
<button id="start">شغل الكاميرا</button>
<br><br>
<label>حساسية الحركة: <span id="sval">30</span></label>
<input type="range" id="sensitivity" min="5" max="100" value="30">
<br>
<label>تضخيم الهالة: <span id="bval">3</span></label>
<input type="range" id="boost" min="1" max="10" value="3">
<br>
<button id="mode1">وضع الضباب</button>
<button id="mode2">وضع الهالة</button>
<button id="mode3">وضع الضجيج</button>
<p style="color:#0ff;font-size:12px">حرك يدك قدام الكاميرا<br>في الضلام بتظهر أشكال</p>
</div>

<script>
const video = document.getElementById('cam');
const canvas = document.getElementById('out');
const ctx = canvas.getContext('2d');
let mode = 1;
let lastFrame = null;
let sensitivity = 30;
let boost = 3;

// شغل الكاميرا
document.getElementById('start').onclick = async () => {
  const stream = await navigator.mediaDevices.getUserMedia({video: {facingMode: 'environment'}});
  video.srcObject = stream;
  video.onloadedmetadata = () => {
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    process();
  };
};

// المعالجة كل فريم
function process(){
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
  let frame = ctx.getImageData(0, 0, canvas.width, canvas.height);
  let data = frame.data;

  if(mode === 1) detectMotion(data); // الضباب المتحرك
  if(mode === 2) detectAura(data); // الهالة حوالين الأجسام
  if(mode === 3) amplifyNoise(data); // تضخيم الضجيج

  ctx.putImageData(frame, 0, 0);
  requestAnimationFrame(process);
}

// 1. كشف الحركة = ضباب أخضر
function detectMotion(data){
  if(!lastFrame) { lastFrame = new Uint8ClampedArray(data); return; }

  for(let i=0; i<data.length; i+=4){
    let diff = Math.abs(data[i] - lastFrame[i]) +
               Math.abs(data[i+1] - lastFrame[i+1]) +
               Math.abs(data[i+2] - lastFrame[i+2]);

    if(diff > sensitivity){
      data[i] = 0; // R
      data[i+1] = diff*2; // G = الضباب
      data[i+2] = diff; // B
    } else {
      data[i] = data[i]/4; // نخلي الخلفية معتمة
      data[i+1] = data[i+1]/4;
      data[i+2] = data[i+2]/4;
    }
  }
  lastFrame = new Uint8ClampedArray(data);
}

// 2. كشف الحواف = هالة
function detectAura(data){
  let temp = new Uint8ClampedArray(data);
  for(let y=1; y<canvas.height-1; y++){
    for(let x=1; x<canvas.width-1; x++){
      let i = (y*canvas.width + x)*4;
      // كشف الحافة بفرق الجيران
      let edge = Math.abs(temp[i] - temp[i+4]) + Math.abs(temp[i] - temp[i+canvas.width*4]);
      if(edge > 20){
        data[i] = 255; // R
        data[i+1] = 200 + boost*20; // G = هالة صفراء
        data[i+2] = 0; // B
      }
    }
  }
}

// 3. تضخيم الضجيج = طاقة عشوائية
function amplifyNoise(data){
  for(let i=0; i<data.length; i+=4){
    let brightness = (data[i] + data[i+1] + data[i+2])/3;
    if(brightness < 40){ // الأماكن المظلمة بس
      let noise = (Math.random()-0.5) * boost * 50;
      data[i] = Math.max(0, Math.min(255, data[i] + noise)); // R
      data[i+1] = Math.max(0, Math.min(255, data[i+1] + noise*1.5)); // G
      data[i+2] = Math.max(0, Math.min(255, data[i+2] + noise*2)); // B
    }
  }
}

// التحكم
document.getElementById('sensitivity').oninput = e => {
  sensitivity = e.target.value;
  document.getElementById('sval').innerText = sensitivity;
}
document.getElementById('boost').oninput = e => {
  boost = e.target.value;
  document.getElementById('bval').innerText = boost;
}
document.getElementById('mode1').onclick = () => mode = 1;
document.getElementById('mode2').onclick = () => mode = 2;
document.getElementById('mode3').onclick = () => mode = 3;
</script>
</body>
</html>
