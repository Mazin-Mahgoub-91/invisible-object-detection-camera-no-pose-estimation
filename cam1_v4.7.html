<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>v4.3 Heat Audio</title>
<style>
body{background:#000;margin:0;overflow:hidden;color:#0f0;font-family:tahoma}
video,canvas{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover}
#ui{position:absolute;top:10px;right:10px;z-index:10;background:#000d;padding:12px;border:2px solid #0f0;border-radius:8px;width:220px}
button{background:#0f0;color:#000;border:none;padding:8px;margin:4px 0;width:100%;cursor:pointer;font-weight:bold;border-radius:5px}
button.purple{background:purple;color:#fff}
label{color:#ff0;font-size:13px}
input{width:100%}
#status{color:#0ff;text-align:center;font-size:12px;margin-top:5px}
#audioLevel{height:10px;background:#222;margin-top:5px;border:1px solid #0f0}
#audioBar{height:100%;width:0%;background:#f00}
</style>
</head>
<body>
<video id="cam" autoplay playsinline muted></video>
<canvas id="out"></canvas>

<div id="ui">
<h3 style="margin:0 0 8px;text-align:center">v4.3 Heat+Audio</h3>
<button id="start">شغل الكاميرا والمايك</button>
<button id="record">تسجيل</button>
<button id="mode4" class="purple">وضع الكيان</button>
<label>الحساسية: <span id="sval">28</span></label>
<input type="range" id="sens" min="10" max="80" value="28">
<label>مستوى الصوت:</label>
<div id="audioLevel"><div id="audioBar"></div></div>
<div id="status">جاهز</div>
</div>

<script>
const video = document.getElementById('cam');
const canvas = document.getElementById('out');
const ctx = canvas.getContext('2d');
const status = document.getElementById('status');
const audioBar = document.getElementById('audioBar');

let sens = 28;
let lastFrame = null;
let recorder, chunks = [];
let audioCtx, analyser;
let mode = 4;
let audioLevel = 0;

document.getElementById('start').onclick = async function() {
  try{
    let vStream = await navigator.mediaDevices.getUserMedia({video:true});
    video.srcObject = vStream;

    let micStream = await navigator.mediaDevices.getUserMedia({audio:true});
    audioCtx = new AudioContext();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    let micSource = audioCtx.createMediaStreamSource(micStream);
    micSource.connect(analyser);
    monitorAudio();

    video.onloadedmetadata = function() {
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      status.innerText = 'شغال ✓';
      process();
    };
  }catch(e){
    status.innerText = 'خطأ: ' + e.message;
    alert(e.message);
  }
};

function monitorAudio(){
  let dataArray = new Uint8Array(analyser.frequencyBinCount);
  function update(){
    analyser.getByteFrequencyData(dataArray);
    let sum = 0;
    for(let i=0; i<dataArray.length; i++){
      sum = sum + dataArray[i];
    }
    let avg = sum / dataArray.length;
    audioLevel = avg;
    audioBar.style.width = Math.min(avg*2, 100) + '%';
    requestAnimationFrame(update);
  }
  update();
}

function getHeatColor(bright){
  let r = Math.floor((bright/255) * 255);
  let b = Math.floor((1 - bright/255) * 255);
  return 'rgb(' + r + ',0,' + b + ')';
}

function detectEntity(){
  if(lastFrame == null){
    lastFrame = ctx.getImageData(0, 0, canvas.width, canvas.height);
    return;
  }

  let currentFrame = ctx.getImageData(0, 0, canvas.width, canvas.height);
  let output = new ImageData(canvas.width, canvas.height);
  let found = false;

  for(let i=0; i<currentFrame.data.length; i=i+4){
    let r = currentFrame.data[i];
    let g = currentFrame.data[i+1];
    let b = currentFrame.data[i+2];
    let bright = (r + g + b) / 3;
    let heat = getHeatColor(bright);
    let nums = heat.match(/\d+/g);
    output.data[i] = parseInt(nums[0]);
    output.data[i+1] = parseInt(nums[1]);
    output.data[i+2] = parseInt(nums[2]);
    output.data[i+3] = 255;
  }

  for(let y=4; y<canvas.height-4; y=y+4){
    for(let x=4; x<canvas.width-4; x=x+4){
      let i = (y * canvas.width + x) * 4;
      let diff = Math.abs(currentFrame.data[i] - lastFrame.data[i]) +
                 Math.abs(currentFrame.data[i+1] - lastFrame.data[i+1]) +
                 Math.abs(currentFrame.data[i+2] - lastFrame.data[i+2]);

      if(diff > sens){
        let bright = (currentFrame.data[i] + currentFrame.data[i+1] + currentFrame.data[i+2]) / 3;
        found = true;
        if(bright < 80 && audioLevel > 15){
          status.innerText = 'كيان بارد + صوت';
        }else{
          status.innerText = 'كيان مكتشف';
        }
        ctx.strokeStyle = bright < 80? '#00ffff' : '#0f0';
        ctx.lineWidth = 3;
        ctx.strokeRect(x-10, y-10, 20, 20);
      }
    }
  }

  if(found == false){
    status.innerText = 'ما في كيان';
  }

  ctx.putImageData(output, 0, 0);
  lastFrame = currentFrame;
}

function process(){
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
  if(mode == 4){
    detectEntity();
  }
  requestAnimationFrame(process);
}

document.getElementById('sens').oninput = function(e){
  sens = e.target.value;
  document.getElementById('sval').innerText = sens;
};

document.getElementById('record').onclick = function(){
  if(recorder == null || recorder.state == 'inactive'){
    chunks = [];
    recorder = new MediaRecorder(canvas.captureStream(24));
    recorder.ondataavailable = function(e){ chunks.push(e.data); };
    recorder.onstop = function(){
      let blob = new Blob(chunks, {type: 'video/webm'});
      let a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'heat_' + Date.now() + '.webm';
      a.click();
    };
    recorder.start();
    document.getElementById('record').innerText = 'إيقاف';
  }else{
    recorder.stop();
    document.getElementById('record').innerText = 'تسجيل';
  }
};
</script>
</body>
</html>
