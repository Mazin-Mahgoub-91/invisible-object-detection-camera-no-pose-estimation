<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>كاميرا الهالات v3 - إنذار</title>
<style>
body{background:#000;margin:0;overflow:hidden;color:#0f0;font-family:tahoma}
video,canvas{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover}
#ui{position:absolute;top:10px;right:10px;z-index:10;background:#000a;padding:10px;border:2px solid #0f0;border-radius:8px;max-width:180px}
button{background:#0f0;color:#000;border:none;padding:8px 12px;margin:3px;width:100%;cursor:pointer;border-radius:5px;font-weight:bold;font-size:12px}
button:active{background:#ff0}
button.danger{background:red;color:#fff}
label{color:#ff0;font-size:12px;display:block;margin-top:5px}
input[type=range]{width:100%}
h3{color:#ff0;margin:0 0 10px;font-size:16px;text-align:center}
p{color:#0ff;font-size:11px;margin:5px 0}
#recording{color:red;font-weight:bold;display:none;animation:blink 0.5s infinite}
@keyframes blink{50%{opacity:0}}
</style>
</head>
<body>
<video id="cam" autoplay playsinline></video>
<canvas id="out"></canvas>

<div id="ui">
<h3>كاميرا الطاقة v3</h3>
<button id="start">شغل الكاميرا</button>
<button id="record">سجل فيديو</button>
<span id="recording">● REC</span>

<label>حساسية الحركة: <span id="sval">30</span></label>
<input type="range" id="sensitivity" min="5" max="100" value="30">

<label>تضخيم الهالة: <span id="bval">3</span></label>
<input type="range" id="boost" min="1" max="10" value="3">

<label>تضخيم الليل: <span id="nval">60</span></label>
<input type="range" id="night" min="30" max="100" value="60">

<button id="mode1">1. الضباب</button>
<button id="mode2">2. الهالة</button>
<button id="mode3">3. الضجيج + تتبع</button>

<button id="alarmBtn" class="danger">الإنذار: شغال</button>
<p>حرك يدك قدام الكاميرا<br>الإنذار بصفر مع الكتلة</p>
</div>

<script>
const video = document.getElementById('cam');
const canvas = document.getElementById('out');
const ctx = canvas.getContext('2d');
let mode = 3;
let lastFrame = null;
let sensitivity = 30;
let boost = 3;
let nightThreshold = 60;
let recorder, chunks = [];
let trackedX = 0, trackedY = 0, trackedSize = 0;

// نظام الصوت
let audioCtx;
let alarmEnabled = true;
let lastAlarmTime = 0;

// شغل الكاميرا + الصوت
document.getElementById('start').onclick = async () => {
  // تشغيل الصوت لازم يجي من ضغطة المستخدم
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  const stream = await navigator.mediaDevices.getUserMedia({video: {facingMode: 'environment'}});
  video.srcObject = stream;
  video.onloadedmetadata = () => {
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    process();
  };
};

// تشغيل صوت الإنذار
function playAlarm(){
  if(!audioCtx ||!alarmEnabled) return;
  if(Date.now() - lastAlarmTime < 1000) return; // ما يصفر كل فريم، كل ثانية مرة

  lastAlarmTime = Date.now();

  let osc = audioCtx.createOscillator();
  let gain = audioCtx.createGain();

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.frequency.setValueAtTime(800, audioCtx.currentTime); // صوت عالي
  osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);

  gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);

  osc.start(audioCtx.currentTime);
  osc.stop(audioCtx.currentTime + 0.3);
}

// تسجيل الفيديو
document.getElementById('record').onclick = () => {
  const recBtn = document.getElementById('record');
  const recSpan = document.getElementById('recording');

  if(!recorder || recorder.state === 'inactive'){
    chunks = [];
    recorder = new MediaRecorder(canvas.captureStream(25), {mimeType: 'video/webm'});
    recorder.ondataavailable = e => chunks.push(e.data);
    recorder.onstop = () => {
      let blob = new Blob(chunks, {type: 'video/webm'});
      let a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'aura_' + Date.now() + '.webm';
      a.click();
      recSpan.style.display = 'none';
    };
    recorder.start();
    recBtn.innerText = 'وقف التسجيل';
    recSpan.style.display = 'inline';
  } else {
    recorder.stop();
    recBtn.innerText = 'سجل فيديو';
  }
};

// زر تشغيل/إيقاف الإنذار
document.getElementById('alarmBtn').onclick = e => {
  alarmEnabled =!alarmEnabled;
  e.target.innerText = alarmEnabled? 'الإنذار: شغال' : 'الإنذار: مطفي';
  e.target.style.background = alarmEnabled? 'red' : '#555';
}

// المعالجة كل فريم
function process(){
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
  let frame = ctx.getImageData(0, 0, canvas.width, canvas.height);
  let data = frame.data;

  if(mode === 1) detectMotion(data);
  if(mode === 2) detectAura(data);
  if(mode === 3) amplifyNoiseAndTrack(data);

  ctx.putImageData(frame, 0, 0);
  requestAnimationFrame(process);
}

// 1. كشف الحركة
function detectMotion(data){
  if(!lastFrame) { lastFrame = new Uint8ClampedArray(data); return; }
  for(let i=0; i<data.length; i+=4){
    let diff = Math.abs(data[i] - lastFrame[i]) +
               Math.abs(data[i+1] - lastFrame[i+1]) +
               Math.abs(data[i+2] - lastFrame[i+2]);
    if(diff > sensitivity){
      data[i] = 0;
      data[i+1] = Math.min(255, diff*2);
      data[i+2] = diff;
    } else {
      data[i] = data[i]/4;
      data[i+1] = data[i+1]/4;
      data[i+2] = data[i+2]/4;
    }
  }
  lastFrame = new Uint8ClampedArray(data);
}

// 2. كشف الحواف
function detectAura(data){
  let temp = new Uint8ClampedArray(data);
  for(let y=1; y<canvas.height-1; y++){
    for(let x=1; x<canvas.width-1; x++){
      let i = (y*canvas.width + x)*4;
      let edge = Math.abs(temp[i] - temp[i+4]) + Math.abs(temp[i] - temp[i+canvas.width*4]);
      if(edge > 20){
        data[i] = 255;
        data[i+1] = 200 + boost*20;
        data[i+2] = 0;
      }
    }
  }
}

// 3. ضجيج + تتبع + إنذار
function amplifyNoiseAndTrack(data){
  let points = [];

  for(let i=0; i<data.length; i+=4){
    let brightness = (data[i] + data[i+1] + data[i+2])/3;
    if(brightness < nightThreshold){
      let noise = (Math.random()-0.5) * boost * 60;
      data[i] = Math.max(0, Math.min(255, data[i] + noise));
      data[i+1] = Math.max(0, Math.min(255, data[i+1] + noise*1.5));
      data[i+2] = Math.max(0, Math.min(255, data[i+2] + noise*2.5));

      if(data[i+1] > 150){
        let x = (i/4) % canvas.width;
        let y = Math.floor((i/4) / canvas.width);
        points.push({x, y});
        data[i] = 0; data[i+1] = 255; data[i+2] = 255;
      }
    } else {
      data[i] = data[i]/3;
      data[i+1] = data[i+1]/3;
      data[i+2] = data[i+2]/3;
    }
  }

  if(points.length > 20){
    let minX = Math.min(...points.map(p=>p.x));
    let maxX = Math.max(...points.map(p=>p.x));
    let minY = Math.min(...points.map(p=>p.y));
    let maxY = Math.max(...points.map(p=>p.y));

    trackedX = minX;
    trackedY = minY;
    trackedSize = Math.max(maxX-minX, maxY-minY);

    ctx.strokeStyle = 'red';
    ctx.lineWidth = 3;
    ctx.strokeRect(trackedX-5, trackedY-5, trackedSize+10, trackedSize+10);

    ctx.fillStyle = 'red';
    ctx.font = '16px tahoma';
    ctx.fillText('كتلة مكتشفة!', trackedX, trackedY-10);

    // صفارة الإنذار
    playAlarm();
  }
}

// التحكم
document.getElementById('sensitivity').oninput = e => {
  sensitivity = e.target.value;
  document.getElementById('sval').innerText = sensitivity;
}
document.getElementById('boost').oninput = e => {
  boost = e.target.value;
  document.getElementById('bval').innerText = boost;
}
document.getElementById('night').oninput = e => {
  nightThreshold = e.target.value;
  document.getElementById('nval').innerText = nightThreshold;
}
document.getElementById('mode1').onclick = () => mode = 1;
document.getElementById('mode2').onclick = () => mode = 2;
document.getElementById('mode3').onclick = () => mode = 3;
</script>
</body>
</html>
